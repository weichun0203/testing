<body class="min-h-screen flex flex-col justify-between selection:bg-sage selection:text-white no-scroll">

    <main class="flex-grow w-full max-w-6xl mx-auto px-4 md:px-6 pb-20">

            <!-- 分類按鈕 (手機版支援左右滑動) -->
            <div id="filter-buttons" class="flex overflow-x-auto no-scrollbar gap-2 pb-2 md:pb-0 md:flex-wrap md:justify-center">
                <button onclick="filterTools('all')" class="filter-btn active px-4 py-1.5 rounded-full text-[13px] md:text-sm tracking-wide bg-ink text-paper border border-ink flex-shrink-0">

                <div id="social-container" class="flex flex-wrap justify-center gap-3 md:gap-4">

    <script>
        // ==========================================
        // 0. 開場動畫邏輯 (Splash Screen Logic)
        // ==========================================
        window.addEventListener('load', () => {
            const splash = document.getElementById('splash-screen');
            
            // 延遲 0.8 秒後開始淡出開場畫面
            setTimeout(() => {
                splash.classList.add('opacity-0', 'pointer-events-none');
                
                // 動畫結束後徹底移除元素，並解鎖背景滾動
                setTimeout(() => {
                    splash.remove();
                    document.body.classList.remove('no-scroll');
                }, 500); // 這裡的 500 對應 CSS 裡的 duration-500
            }, 800);
        });

        // ==========================================
        // 1. 工具列表設定 (Tools Data)
        // ==========================================
        const toolsData = [
            { title: "運費成本報價", desc: "精算跨境物流開銷，掌握每一分成本與利潤。", icon: "ph-truck", tag: "Business", link: "shipping-fee-calculator.html", color: "text-stone-600" },
            { title: "存股加薪計算", desc: "預見未來的被動收入，規劃溫柔的財富藍圖。", icon: "ph-plant", tag: "Invest", link: "dividend-investing.html", color: "text-emerald-700" },
            { title: "薪資分配計算", desc: "或是儲蓄或是享受，找到收支的完美平衡。", icon: "ph-wallet", tag: "Invest", link: "daily-budget.html", color: "text-amber-700" },
            { title: "複利股價計算", desc: "時間是投資最好的朋友，見證複利的力量。", icon: "ph-trend-up", tag: "Invest", link: "compound-interest.html", color: "text-blue-800" },
            { title: "時間價值換算", desc: "每筆支出，都是一段生命的交換。", icon: "ph-clock", tag: "Invest", link: "time-value-of-money.html", color: "text-blue-800" },
            { title: "決策矩陣分析", desc: "透過理性權重梳理，輔助感性的選擇。", icon: "ph-matrix-logo", tag: "Planning", link: "decision-matrix-analysis.html", color: "text-amber-700" },
            { title: "曼陀羅九宮格", desc: "分析問題核心、完整思考，讓理想落地。", icon: "ph-squares-four", tag: "Planning", link: "mandala-chart.html", color: "text-amber-700" },
            { title: "LOGO設計思考", desc: "建立基礎LOGO設計認知，開始打造品牌。", icon: "ph-pen-nib", tag: "Design", link: "logo-design.html", color: "text-amber-700" },
            { title: "職涯探索羅盤", desc: "透過喜好與耐心，記錄你的天賦熱情。", icon: "ph-compass", tag: "Growth", link: "career-exploration.html", color: "text-amber-700" },
            { title: "食間・菜單", desc: "解決選擇障礙，今天要吃什麼？", icon: "ph-bowl-food", tag: "Daily", link: "taiwanese-food.html", color: "text-amber-700" },
            { title: "愛的基礎原型", desc: "愛的六色輪 - 探索情感基礎理論。", icon: "ph-heart", tag: "Growth", link: "love-style.html", color: "text-rose-700" },
            { title: "理財金字塔", desc: "建立完整基礎的財務知識結構。", icon: "ph-pyramid", tag: "Invest", link: "money-stack.html", color: "text-amber-700" },
            { title: "生活任務小卡", desc: "讓簡單的任務重整生活的平靜。", icon: "ph-check-square-offset", tag: "Daily", link: "daily-task.html", color: "text-teal-700" },
            { title: "病人照護APP", desc: "醫院照顧紀錄使用", icon: "ph-bed", tag: "Product", link: "patient-care-log.html", color: "text-blue-600" },
            { title: "時間記帳APP", desc: "覺察與分析日常的時間流", icon: "ph-hourglass", tag: "Product", link: "time-expenses.html", color: "text-indigo-600" },
            { title: "貼心票卷產生", desc: "讓生活儀式感充滿活力", icon: "ph-ticket", tag: "Product", link: "love-coupon.html", color: "text-pink-600" },
            { title: "任務懸賞產生", desc: "活潑的方式解決日常任務", icon: "ph-scroll", tag: "Product", link: "task-generator.html", color: "text-amber-800" },            
            { title: "愛的六種方式", desc: "愛的實際行動與表達形式", icon: "ph-hand-heart", tag: "Growth", link: "love-language.html", color: "text-rose-600" },
            { title: "定期定額成本", desc: "為資產穩定增值，訂下策略資產增值", icon: "ph-chart-line-up", tag: "Invest", link: "stock-analysis.html", color: "text-emerald-700" },
            { title: "QR-code產生", desc: "即時生成 QR Code，一鍵下載無需等待。", icon: "ph-qr-code", tag: "Tool", link: "qr-code.html", color: "text-gray-700" },
            { title: "朋友圈APP", desc: "管理你的交友圈，時時維繫重要的人", icon: "ph-users-three", tag: "Product", link: "friend-zone.html", color: "text-emerald-600" },
            { title: "訂購單APP", desc: "建立訂購單，快速產生專業印象", icon: "ph-receipt", tag: "Product", link: "shipping-order.html", color: "text-blue-700" },
        ];
        
        // ==========================================
        // 2. 關於我連結設定
        // ==========================================
        const socialData = [
            { title: "Instagram", link: "https://www.instagram.com/ambientedit_", icon: "ph-instagram-logo" },
            { title: "Facebook", link: "https://www.facebook.com/weichun0203/?locale=zh_TW", icon: "ph-facebook-logo" },
            { title: "Line@", link: "https://line.me/R/ti/p/@890mvlvl", icon: "ph-line-logo"},
            { title: "聯絡我", link: "mailto:weichun0203@gmail.com", icon: "ph-envelope-simple" },
            { title: "賣貨便", link: "https://myship.7-11.com.tw/general/detail/GM2601131963313", icon: "ph-storefront" }
        ];

        // ==========================================
        // 3. 核心邏輯
        // ==========================================
        
        const container = document.getElementById('tool-container');
        const emptyState = document.getElementById('empty-state');
        const searchInput = document.getElementById('search-input');
        const filterBtnContainer = document.getElementById('filter-buttons');

        let currentFilter = 'all';
        let currentSearch = '';

        // A. 初始化：產生分類按鈕
        function initFilterButtons() {
            // 使用 Set 取得不重複的標籤，並排序
            const tags = [...new Set(toolsData.map(item => item.tag))].sort();
            
            tags.forEach(tag => {
                const btn = document.createElement('button');
                btn.className = `filter-btn flex-shrink-0 px-4 py-1.5 rounded-full text-[13px] md:text-sm tracking-wide bg-transparent text-gray-500 border border-transparent hover:bg-gray-100 hover:text-ink`;
                btn.textContent = tag;
                btn.onclick = () => filterTools(tag, btn);
                filterBtnContainer.appendChild(btn);
            });
        }

        // B. 過濾功能
        function filterTools(tag, btnElement = null) {
            if (tag) currentFilter = tag;
            
            if (btnElement || tag === 'all') {
                const allBtns = document.querySelectorAll('.filter-btn');
                allBtns.forEach(b => {
                    b.classList.remove('active', 'bg-ink', 'text-paper', 'border-ink');
                    b.classList.add('bg-transparent', 'text-gray-500', 'border-transparent');
                });

                const activeBtn = btnElement || document.querySelector('.filter-btn');
                activeBtn.classList.remove('bg-transparent', 'text-gray-500', 'border-transparent');
                activeBtn.classList.add('active', 'bg-ink', 'text-paper', 'border-ink');
            }

            renderTools();
        }

        // C. 搜尋功能監聽
        searchInput.addEventListener('input', (e) => {
            currentSearch = e.target.value.toLowerCase();
            renderTools();
        });

        // D. 渲染工具卡片 (極簡文字與浮水印風格)
        function renderTools() {
            container.innerHTML = '';
            
            // 移除資料中完全重複的項目並進行過濾
            const uniqueTools = Array.from(new Set(toolsData.map(t => t.title)))
                .map(title => toolsData.find(t => t.title === title));

            const filteredData = uniqueTools.filter(tool => {
                const matchTag = currentFilter === 'all' || tool.tag === currentFilter;
                const matchSearch = tool.title.toLowerCase().includes(currentSearch);
                return matchTag && matchSearch;
            });

            if (filteredData.length === 0) {
                container.classList.add('hidden');
                emptyState.classList.remove('hidden');
            } else {
                container.classList.remove('hidden');
                emptyState.classList.add('hidden');
                
                filteredData.forEach(tool => {
                    const card = document.createElement('a');
                    card.href = tool.link;
                    // 卡片主體樣式設計：增加 overflow-hidden 避免浮水印超出範圍
                    card.className = `
                        group flex flex-col items-center justify-center bg-white p-4 md:p-6 border border-sand/50
                        rounded-2xl md:rounded-3xl shadow-soft card-hover relative overflow-hidden
                        cursor-pointer animate-fade-in text-center min-h-[6.5rem] md:min-h-[9rem] h-full
                    `;
                    card.style.animation = "fadeIn 0.5s ease-out";
                    
                    card.innerHTML = `
                        <!-- 背景浮水大寫英文字母 (預設顯示，hover 時微微放大並加深) -->
                        <div class="absolute -right-2 -bottom-4 md:-right-4 md:-bottom-6 text-7xl md:text-9xl text-sand opacity-40 group-hover:opacity-70 group-hover:scale-110 transition-all duration-500 pointer-events-none select-none font-serif font-bold z-0">
                            ${tool.tag.charAt(0)}
                        </div>
                        
                        <!-- 內容容器 -->
                        <div class="relative z-10 w-full flex flex-col items-center">
                            <!-- 英文分類小字 -->
                            <div class="text-[9px] md:text-[10px] tracking-[0.2em] uppercase text-gray-400 mb-1.5 md:mb-2.5 font-sans transition-colors duration-300 group-hover:text-sage/70">
                                ${tool.tag}
                            </div>
                            
                            <!-- 標題 (限制最多兩行) -->
                            <h2 class="text-[12px] md:text-[15px] font-sans md:font-serif font-medium text-ink/90 group-hover:text-sage transition-colors duration-300 line-clamp-2 leading-snug w-full px-1">
                                ${tool.title}
                            </h2>
                            
                            <!-- 說明文字 (手機版隱藏，平板/電腦版顯示) -->
                            <p class="hidden md:block text-[11px] md:text-xs text-gray-400 mt-2 line-clamp-2 font-light leading-relaxed px-2">
                                ${tool.desc}
                            </p>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }
        }

        // E. 渲染社群連結
        const socialContainer = document.getElementById('social-container');
        socialData.forEach(item => {
            const btn = document.createElement('a');
            btn.href = item.link;
            btn.target = "_blank";
            btn.className = `
                btn-hover inline-flex items-center justify-center gap-2 px-4 py-2 md:px-6 md:py-3 
                border border-gray-300 rounded-full md:rounded-sm text-xs md:text-sm tracking-widest text-gray-600
                bg-transparent w-[calc(50%-0.5rem)] md:w-auto
            `;
            btn.innerHTML = `<i class="${item.icon} text-base md:text-lg"></i><span>${item.title}</span>`;
            socialContainer.appendChild(btn);
        });

        // F. 啟動
        initFilterButtons();
        renderTools();

        // 注入動畫樣式
        const styleSheet = document.createElement("style");
        styleSheet.textContent = `
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
        `;
        document.head.appendChild(styleSheet);

    </script>
    <script>
      // 註冊 PWA Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(registration => {
              console.log('常溫 PWA ServiceWorker 註冊成功！');
            })
            .catch(err => {
              console.log('ServiceWorker 註冊失敗: ', err);
            });
        });
      }
    </script>
</body>
